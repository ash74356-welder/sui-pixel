<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>广州像素画布 - GZ Pixel Canvas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      background: #1a1a1a;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .pixel-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      z-index: 400;
    }

    .grid-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 450;
    }

    /* 顶部导航栏 */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo::before {
      content: '🎨';
      font-size: 24px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      color: #fff;
      font-size: 14px;
    }

    .online-count {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #4ade80;
    }

    .online-count::before {
      content: '●';
      color: #4ade80;
    }

    .current-user {
      color: #60a5fa;
    }

    /* 底部工具栏 */
    .toolbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 2000;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
    }

    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .tool-btn.active {
      background: #3b82f6;
    }

    .tool-divider {
      width: 1px;
      height: 30px;
      background: rgba(255, 255, 255, 0.2);
    }

    /* 颜色选择器 - 轮盘 */
    .color-picker-container {
      position: relative;
    }

    .current-color {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid #fff;
      cursor: pointer;
      background: #ff0000;
      transition: transform 0.2s;
    }

    .current-color:hover {
      transform: scale(1.1);
    }

    /* 颜色选择面板 */
    .color-panel {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.95);
      border-radius: 16px;
      padding: 20px;
      display: none;
      z-index: 1001;
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-width: 320px;
    }

    .color-panel.show {
      display: block;
    }

    /* 色轮 */
    .color-wheel-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .color-wheel-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
    }

    #color-wheel {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      cursor: crosshair;
    }

    .color-wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: #fff;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.5);
    }

    /* RGB 输入 */
    .rgb-inputs {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .rgb-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .rgb-group label {
      color: #fff;
      font-size: 12px;
      font-weight: bold;
    }

    .rgb-group input {
      width: 60px;
      height: 35px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .rgb-group input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .rgb-group.r input { border-color: rgba(239, 68, 68, 0.5); }
    .rgb-group.g input { border-color: rgba(34, 197, 94, 0.5); }
    .rgb-group.b input { border-color: rgba(59, 130, 246, 0.5); }

    .rgb-divider {
      color: #666;
      font-size: 20px;
      margin-top: 15px;
    }

    /* 当前颜色预览 */
    .color-preview-section {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 10px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .color-preview {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      border: 2px solid #fff;
    }

    .color-hex {
      color: #fff;
      font-family: monospace;
      font-size: 16px;
    }

    .apply-color-btn {
      margin-left: auto;
      padding: 8px 20px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .apply-color-btn:hover {
      background: #2563eb;
    }

    /* 亮度滑块 */
    .brightness-slider-container {
      width: 100%;
      margin-top: 10px;
    }

    .brightness-slider-container label {
      color: #aaa;
      font-size: 12px;
      display: block;
      margin-bottom: 5px;
    }

    #brightness-slider {
      width: 100%;
      height: 20px;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 10px;
      background: linear-gradient(to right, #000, #ff0000, #fff);
      cursor: pointer;
    }

    #brightness-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #3b82f6;
      cursor: pointer;
    }

    /* 大小选择 */
    .size-selector {
      display: flex;
      gap: 5px;
    }

    .size-btn {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
    }

    .size-btn:hover {
      border-color: rgba(255, 255, 255, 0.6);
    }

    .size-btn.active {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.2);
    }

    /* 模式切换 */
    .mode-toggle {
      display: flex;
      gap: 5px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 3px;
    }

    .mode-btn {
      width: 50px;
      height: 34px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
    }

    .mode-btn:hover {
      color: #fff;
    }

    .mode-btn.active {
      background: #3b82f6;
      color: #fff;
    }

    /* 框选橡皮擦 */
    .selection-box {
      position: absolute;
      border: 2px dashed #ef4444;
      background: rgba(239, 68, 68, 0.2);
      pointer-events: none;
      z-index: 500;
      display: none;
    }

    .selection-box.active {
      display: block;
    }

    /* 导入对话框 */
    .import-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .import-modal.show {
      display: flex;
    }

    .import-dialog {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .import-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .import-title {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
    }

    .import-close {
      background: none;
      border: none;
      color: #999;
      font-size: 24px;
      cursor: pointer;
    }

    .import-close:hover {
      color: #fff;
    }

    .import-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .import-tab {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
    }

    .import-tab:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .import-tab.active {
      background: #3b82f6;
      color: #fff;
    }

    .import-content {
      display: none;
    }

    .import-content.active {
      display: block;
    }

    .file-drop-zone {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-drop-zone:hover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }

    .file-drop-zone.dragover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.2);
    }

    .file-input {
      display: none;
    }

    .text-input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      resize: vertical;
      min-height: 100px;
    }

    .text-input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .preview-container {
      margin-top: 20px;
      text-align: center;
    }

    .preview-image {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .import-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .import-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .import-btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
    }

    .import-btn-cancel:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .import-btn-confirm {
      background: #3b82f6;
      color: #fff;
    }

    .import-btn-confirm:hover {
      background: #2563eb;
    }

    .import-btn-confirm:disabled {
      background: #666;
      cursor: not-allowed;
    }

    .import-options {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .option-row:last-child {
      margin-bottom: 0;
    }

    .option-label {
      color: #ccc;
      font-size: 14px;
      min-width: 80px;
    }

    .option-select {
      flex: 1;
      padding: 8px 12px;
      background: #2a2a2a;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .option-select:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .option-select option {
      background: #2a2a2a;
      color: #fff;
      padding: 8px;
    }

    .info-text {
      color: #888;
      font-size: 12px;
      margin-top: 10px;
    }

    /* 右侧面板 */
    .right-panel {
      position: absolute;
      top: 70px;
      right: 20px;
      width: 200px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-section {
      margin-bottom: 15px;
    }

    .panel-title {
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .layer-control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .layer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #ccc;
      font-size: 13px;
    }

    .layer-toggle {
      width: 36px;
      height: 20px;
      background: #3b82f6;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .layer-toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      right: 2px;
      transition: all 0.2s;
    }

    .layer-toggle.off {
      background: #666;
    }

    .layer-toggle.off::after {
      right: 18px;
    }

    .online-users {
      max-height: 200px;
      overflow-y: auto;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
      font-size: 13px;
      padding: 5px 0;
    }

    .user-item::before {
      content: '●';
      color: #4ade80;
      font-size: 10px;
    }

    /* 坐标显示 */
    .coords-display {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 10px 15px;
      color: #ccc;
      font-size: 12px;
      font-family: monospace;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* 冷却时间显示 */
    .cooldown-display {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      z-index: 1000;
    }

    .cooldown-display.show {
      display: block;
    }

    /* 缩放控制 */
    .zoom-control {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 1000;
    }

    .zoom-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s;
    }

    .zoom-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* 隐藏提示 */
    .pixel-hidden-notice {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(245, 158, 11, 0.9);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      z-index: 1000;
    }

    .pixel-hidden-notice.show {
      display: block;
    }

    /* 绘制提示 */
    .draw-hint {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(59, 130, 246, 0.9);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 1000;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DG-iOcyx.js"></script>
</head>
<body>
  <div id="app">
    <!-- 顶部导航栏 -->
    <div class="top-bar">
      <div class="logo">广州像素画布</div>
      <div class="user-info">
        <div class="online-count">
          <span>在线: <span id="online-count">1</span>人</span>
        </div>
        <div class="current-user">
          你: <span id="current-user">连接中...</span>
        </div>
      </div>
    </div>

    <!-- 地图容器 -->
    <div id="map"></div>

    <!-- 绘制提示 -->
    <div class="draw-hint" id="draw-hint">🖱️ 点击地图开始绘制像素</div>

    <!-- 像素层隐藏提示 -->
    <div class="pixel-hidden-notice" id="pixel-hidden-notice">
      像素过多，仅显示地图背景
    </div>

    <!-- 冷却时间显示 -->
    <div class="cooldown-display" id="cooldown-display">
      冷却中: <span id="cooldown-time">0</span>s
    </div>

    <!-- 框选区域 -->
    <div class="selection-box" id="selection-box"></div>

    <!-- 导入对话框 -->
    <div class="import-modal" id="import-modal">
      <div class="import-dialog">
        <div class="import-header">
          <h3 class="import-title">导入像素画</h3>
          <button class="import-close" id="import-close">&times;</button>
        </div>

        <div class="import-tabs">
          <button class="import-tab active" data-tab="image">图片</button>
          <button class="import-tab" data-tab="text">文字</button>
        </div>

        <!-- 图片导入 -->
        <div class="import-content active" id="tab-image">
          <div class="file-drop-zone" id="file-drop-zone">
            <p>📁 拖拽图片到此处 或 点击上传</p>
            <p class="info-text">支持 JPG、PNG、GIF 格式，最大 400x400 像素</p>
          </div>
          <input type="file" class="file-input" id="file-input" accept="image/*">

          <div class="import-options">
            <div class="option-row">
              <label class="option-label">颜色模式:</label>
              <select class="option-select" id="image-color-mode">
                <option value="color">彩色 (16色)</option>
                <option value="grayscale">灰度</option>
                <option value="bw">黑白</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 文字导入 -->
        <div class="import-content" id="tab-text">
          <textarea class="text-input" id="text-input" placeholder="输入文字内容..."></textarea>

          <div class="import-options">
            <div class="option-row">
              <label class="option-label">字体大小:</label>
              <select class="option-select" id="text-font-size">
                <option value="24">小</option>
                <option value="48" selected>中</option>
                <option value="72">大</option>
              </select>
            </div>
            <div class="option-row">
              <label class="option-label">文字颜色:</label>
              <div class="text-color-picker" id="text-color-picker" style="width: 40px; height: 40px; border-radius: 8px; border: 2px solid #fff; cursor: pointer; background: #000000;"></div>
            </div>
          </div>

          <!-- 文字颜色选择面板 -->
          <div class="text-color-panel" id="text-color-panel" style="display: none; margin-top: 10px; padding: 15px; background: rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);">
            <canvas id="text-color-wheel" width="150" height="150" style="border-radius: 50%; cursor: crosshair; display: block; margin: 0 auto;"></canvas>
            <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center;">
              <div style="text-align: center;">
                <label style="color: #fff; font-size: 12px;">R</label>
                <input type="number" id="text-rgb-r" value="0" min="0" max="255" style="width: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; text-align: center; border-radius: 4px; padding: 4px;">
              </div>
              <div style="text-align: center;">
                <label style="color: #fff; font-size: 12px;">G</label>
                <input type="number" id="text-rgb-g" value="0" min="0" max="255" style="width: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; text-align: center; border-radius: 4px; padding: 4px;">
              </div>
              <div style="text-align: center;">
                <label style="color: #fff; font-size: 12px;">B</label>
                <input type="number" id="text-rgb-b" value="0" min="0" max="255" style="width: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; text-align: center; border-radius: 4px; padding: 4px;">
              </div>
            </div>
          </div>

          <p class="info-text">文字将自动调整大小以适应 400x400 像素限制</p>
        </div>

        <!-- 预览 -->
        <div class="preview-container" id="preview-container" style="display: none;">
          <p style="color: #ccc; margin-bottom: 10px;">预览:</p>
          <img class="preview-image" id="preview-image" src="" alt="预览">
          <p class="info-text" id="preview-info"></p>
        </div>

        <!-- 操作按钮 -->
        <div class="import-actions">
          <button class="import-btn import-btn-cancel" id="import-cancel">取消</button>
          <button class="import-btn import-btn-confirm" id="import-confirm" disabled>导入到画布</button>
        </div>
      </div>
    </div>

    <!-- 底部工具栏 -->
    <div class="toolbar">
      <!-- 绘制工具 -->
      <button class="tool-btn active" id="tool-draw" title="绘制">✏️</button>
      <button class="tool-btn" id="tool-erase" title="橡皮擦">🧼</button>

      <div class="tool-divider"></div>

      <!-- 模式切换 -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-draw" title="绘制模式">绘制</button>
        <button class="mode-btn" id="mode-pan" title="拖拽模式">拖拽</button>
      </div>

      <div class="tool-divider"></div>

      <!-- 颜色选择 -->
      <div class="color-picker-container">
        <div class="current-color" id="current-color" title="选择颜色"></div>
      </div>

      <!-- 颜色选择面板 -->
      <div class="color-panel" id="color-panel">
        <div class="color-wheel-container">
          <div class="color-wheel-wrapper">
            <canvas id="color-wheel" width="200" height="200"></canvas>
            <div class="color-wheel-center"></div>
          </div>

          <!-- 亮度滑块 -->
          <div class="brightness-slider-container">
            <label>亮度 / Brightness</label>
            <input type="range" id="brightness-slider" min="0" max="100" value="50">
          </div>

          <!-- RGB 输入 -->
          <div class="rgb-inputs">
            <div class="rgb-group r">
              <label>R</label>
              <input type="number" id="rgb-r" min="0" max="255" value="255">
            </div>
            <span class="rgb-divider">/</span>
            <div class="rgb-group g">
              <label>G</label>
              <input type="number" id="rgb-g" min="0" max="255" value="0">
            </div>
            <span class="rgb-divider">/</span>
            <div class="rgb-group b">
              <label>B</label>
              <input type="number" id="rgb-b" min="0" max="255" value="0">
            </div>
          </div>

          <!-- 颜色预览 -->
          <div class="color-preview-section">
            <div class="color-preview" id="color-preview"></div>
            <span class="color-hex" id="color-hex">#FF0000</span>
            <button class="apply-color-btn" id="apply-color">应用</button>
          </div>
        </div>
      </div>

      <div class="tool-divider"></div>

      <!-- 快速图形 -->
      <button class="tool-btn" id="tool-line" title="直线">📏</button>
      <button class="tool-btn" id="tool-circle" title="圆形">⭕</button>
      <button class="tool-btn" id="tool-star" title="星形">⭐</button>

      <div class="tool-divider"></div>

      <!-- 导入功能 -->
      <button class="tool-btn" id="tool-import-image" title="导入图片">🖼️</button>
      <button class="tool-btn" id="tool-import-text" title="导入文字">🔤</button>

      <div class="tool-divider"></div>

    </div>

    <!-- 右侧面板 -->
    <div class="right-panel">
      <!-- 图层控制 -->
      <div class="panel-section">
        <div class="panel-title">🗂️ 图层控制</div>
        <div class="layer-control">
          <div class="layer-item">
            <span>地图</span>
            <div class="layer-toggle" id="layer-map"></div>
          </div>
          <div class="layer-item">
            <span>像素</span>
            <div class="layer-toggle" id="layer-pixel"></div>
          </div>
          <div class="layer-item">
            <span>网格</span>
            <div class="layer-toggle off" id="layer-grid"></div>
          </div>
        </div>
      </div>

      <!-- 在线用户 -->
      <div class="panel-section">
        <div class="panel-title">👥 在线用户</div>
        <div class="online-users" id="online-users">
          <div class="user-item">加载中...</div>
        </div>
      </div>
    </div>

    <!-- 坐标显示 -->
    <div class="coords-display">
      <div>经纬度: <span id="coords-latlng">--, --</span></div>
      <div>像素数: <span id="pixel-count">0</span></div>
    </div>

    <!-- 缩放控制 -->
    <div class="zoom-control">
      <button class="zoom-btn" id="zoom-in" title="放大">+</button>
      <button class="zoom-btn" id="zoom-out" title="缩小">-</button>
      <button class="zoom-btn" id="zoom-reset" title="复位">⌖</button>
    </div>
  </div>

</body>
</html>
